<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Raleway:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Meteora</title>
</head>
<body>
    <div class="container">
        <div class="search-box">
            <div class="form-group">
                <label for="" class="form-label">Country name</label>
                <input type="text" class="form-input" placeholder="Enter country name...">               
            </div>
            <div class="btn">Search</div>
        </div>
        <div class="custom-divider"></div>

        <div class="weather-details-box">
            <div class="current-data-box">
                <div class="left-box">
                    <div class="titles-box">
                        <p class="country-text"></p>
                        <p class="city-text"></p>
                    </div>

                    <div class="condition-box">
                        <img src="" class="condition-icon">
                        <p class="condition-text"></p>
                    </div>
                    <div class="details-box">
                        <p class="feature-text feeling_data"></p>
                        <p class="feature-text wind_dir_data"></p>
                        <p class="feature-text wind_speed_data"></p>
                        <p class="feature-text uv_index"></p>
                        <p class="feature-text humidity_index"></p>
                    </div>
                </div>
                <div class="right-box">
                    <p class="temperature-text"></p>
                </div>
            </div>
            <div class="forecast-data-box">               
            </div>
        </div>
    </div>
</body>
<script src="js/app.js"></script>
</html>
